<script>
  document.addEventListener("DOMContentLoaded", function () {
    var offset = 10000;
    var source = document.getElementById("busuanzi_value_site_pv");
    var target = document.getElementById("site-views");
    if (!source || !target) return;

    var updateViews = function () {
      var rawValue = source.textContent.replace(/,/g, "").trim();
      var views = parseInt(rawValue, 10);
      if (!Number.isNaN(views)) {
        target.textContent = (views + offset).toLocaleString();
        return true;
      }
      return false;
    };

    var attempts = 0;
    var timer = setInterval(function () {
      attempts += 1;
      if (updateViews() || attempts > 40) clearInterval(timer);
    }, 250);
  });
</script>
